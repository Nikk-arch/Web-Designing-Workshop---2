<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks & Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Marks & Grade Calculator</h2>

        <label>Enter Number of Subjects:</label>
        <input type="number" id="numSubjects" min="1">

        <button onclick="generateInputs()">Create Subject Fields</button>

        <div id="subjectsContainer"></div>

        <button onclick="calculateResult()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
